[project]
name = "mcp-pool"
tagline = "MCP Key Pool Proxy"
subtitle = "mcp-pool is itself an MCP server. Pool multiple API keys per service and distribute tool calls across them — one active subprocess at a time, rotate keys on rate-limit."
description = "MCP Key Pool Proxy — pool multiple API keys across rate-limited upstream MCP servers"
github_url = "https://github.com/yuzu-octopus/mcp-pool"
page_url = "https://yuzu-octopus.github.io/mcp-pool"
logo_svg = """
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="4" y="10" width="56" height="44" rx="6" fill="none" stroke="var(--green)" stroke-width="2.5"/>
