[brand]
tagline = "MCP Key Pool Proxy"

[[sections]]
id = "features"
type = "features"
title = "Features"
icon = "grid"

[[sections.items]]
title = "Key Pooling"
body = "Pool multiple API keys for rate-limited MCP servers. Distribute requests across keys to avoid exhausting any single quota."

[[sections.items]]
title = "Lazy Failover"
body = "One subprocess per pool at a time. On rate-limit or crash, the current upstream is closed and a new one spawns with the next key."

[[sections.items]]
title = "Tool Prefixing"
body = "All tools are prefixed with their pool name (e.g. `brave-search__brave_web_search`) to avoid name collisions across pools."

[[sections.items]]
title = "Rate Limit Detection"
body = "Configurable regex patterns matched against tool error text. Non-matching errors are returned to the client immediately without retry."

[[sections.items]]
title = "Key Retry"
body = "Keys are tried in order. Startup retries across all keys until one connects. On failure, advances to the next key."

[[sections.items]]
title = "Stdio Transport"
body = "All upstream MCP servers communicate via stdio subprocesses. No HTTP endpoints to manage."

[[sections]]
id = "quickstart"
type = "code_block"
title = "Quick Start"
icon = "play"
language = "bash"
code = """
# Install globally
npm install -g mcp-pool

# Create a config
cat > ~/.config/mcp-pool/mcp-pool.yaml << 'EOF'
pools:
  brave-search:
    command: bunx
    args: ["-y", "@brave/brave-search-mcp-server"]
    keys:
      - {BRAVE_API_KEY: "${BRAVE_API_KEY_1}"}
      - {BRAVE_API_KEY: "${BRAVE_API_KEY_2}"}
    rateLimitPatterns:
      - "rate_limit_exceeded"
      - "too many requests"
EOF

# Run it
bunx mcp-pool
"""

[[sections]]
id = "how-it-works"
type = "steps"
title = "How It Works"
icon = "layers"

[[sections.items]]
title = "1. Configure"
body = "Define pools in `mcp-pool.yaml`. Each pool = one MCP server type with N API keys. Config is auto-discovered from `./mcp-pool.yaml`, `./.mcp-pool.yaml`, or `~/.config/mcp-pool/mcp-pool.yaml`."

[[sections.items]]
title = "2. Start"
body = "mcp-pool tries each key in order until one connects. Only one upstream subprocess runs at a time per pool."

[[sections.items]]
title = "3. Route"
body = "When a tool call arrives, mcp-pool strips the `{poolName}__` prefix to identify the pool, then forwards the call to the active upstream."

[[sections.items]]
title = "4. Recover"
body = "On rate-limit or transport error, the current upstream is closed, the cursor advances to the next key, and a new subprocess spawns automatically."

